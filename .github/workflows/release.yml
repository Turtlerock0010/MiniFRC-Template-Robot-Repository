name: Package Code For Release

on:
  release:
    types: [published] # Triggers automatically when you hit "Publish Release" on GitHub

jobs:
  upload-assets:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    # 1. Bring your repository code into the runner
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Reformat the folder and main.ino to match Arduino IDE standards
    - name: Restructure and Flatten for Arduino
      run: |
        mkdir ${{ github.event.repository.name }}
        cp src/main.ino ${{ github.event.repository.name }}/${{ github.event.repository.name }}.ino
        cp src/*.cpp ${{ github.event.repository.name }}/ 2>/dev/null || true
        cp src/*.h ${{ github.event.repository.name }}/ 2>/dev/null || true

    # 3. Zip the newly created folder
    - name: Zip Release Folder
      run: zip -r ${{ github.event.repository.name }}.zip ${{ github.event.repository.name }}

    # 4. Upload the zip directly into the GitHub Release page assets
    - name: Upload Zip to Release
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ github.event.repository.name }}.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Automatically provided by GitHub
